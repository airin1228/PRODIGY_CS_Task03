<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Complexity Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#050807;
    --bg-1:#0A100D;
    --bg-2:#0F1712;
    --bg-3:#16211A;
    --line:#1E3327;
    --line-soft:#152218;
    --text-hi:#D8F5E3;
    --text-mid:#7FA88F;
    --text-low:#3F5B4A;
    --teal:#2CF5A0;
    --teal-dim:#0E3324;
    --amber:#F0A83C;
    --amber-dim:#3D2D0F;
    --red:#E5555A;
    --red-dim:#3A1518;
    --blue:#4E9BE0;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(229,85,90,0.16) 0%, transparent 35%),
      radial-gradient(circle at 85% 15%, rgba(44,245,160,0.16) 0%, transparent 38%),
      radial-gradient(circle at 20% 90%, rgba(78,155,224,0.16) 0%, transparent 38%),
      radial-gradient(circle at 88% 88%, rgba(240,168,60,0.14) 0%, transparent 38%),
      radial-gradient(circle at 50% 50%, #0B0F0D 0%, var(--bg-0) 65%);
    background-color:#050807;
    color:var(--text-hi);
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    padding:56px 20px 80px;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(44,245,160,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44,245,160,0.035) 1px, transparent 1px);
    background-size:42px 42px;
    z-index:0;
    pointer-events:none;
    mask-image:radial-gradient(circle at 50% 20%, black 0%, transparent 70%);
  }
  .wrap{width:100%;max-width:620px;position:relative;z-index:2;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--teal);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .eyebrow::before{
    content:"";
    width:7px;height:7px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 0 3px var(--teal-dim);
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:34px;
    line-height:1.15;
    margin:0 0 40px;
    letter-spacing:-0.01em;
    text-shadow:0 0 24px rgba(44,245,160,0.18);
  }
  .panel{
    background:rgba(10,16,13,0.88);
    backdrop-filter:blur(6px);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px;
    margin-bottom:20px;
    box-shadow:0 0 0 1px rgba(44,245,160,0.03), 0 20px 50px -20px rgba(0,0,0,0.6);
  }
  .field-label{
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--text-low);
    margin-bottom:10px;
    display:block;
  }
  .input-row{
    position:relative;
    display:flex;
    align-items:center;
  }
  #pwd{
    width:100%;
    background:var(--bg-0);
    border:1px solid var(--line);
    border-radius:10px;
    padding:15px 90px 15px 16px;
    font-family:'JetBrains Mono',monospace;
    font-size:16px;
    color:var(--text-hi);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  #pwd::placeholder{color:var(--text-low);}
  #pwd:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim);}
  .input-actions{
    position:absolute;
    right:8px;
    display:flex;
    gap:4px;
  }
  .icon-btn{
    background:transparent;
    border:none;
    color:var(--text-mid);
    width:34px;height:34px;
    border-radius:8px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    transition:background .15s ease, color .15s ease;
  }
  .icon-btn:hover{background:var(--bg-3);color:var(--text-hi);}

  .meter-row{
    display:flex;
    gap:6px;
    margin:22px 0 14px;
  }
  .seg{
    height:7px;
    flex:1;
    border-radius:4px;
    background:var(--bg-3);
    overflow:hidden;
    position:relative;
  }
  .seg i{
    display:block;
    height:100%;
    width:0%;
    border-radius:4px;
    transition:width .35s cubic-bezier(.4,0,.2,1), background .35s ease;
  }
  .verdict-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:4px;
  }
  #verdict{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:19px;
  }
  #entropy{
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    color:var(--text-low);
  }
  #crack-time{
    font-size:13.5px;
    color:var(--text-mid);
    margin:0 0 4px;
  }
  #crack-time b{color:var(--text-hi);font-weight:600;}

  .checklist{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 16px;
    margin-top:8px;
  }
  .chk{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:13.5px;
    color:var(--text-low);
    transition:color .2s ease;
  }
  .chk .dot{
    width:18px;height:18px;
    border-radius:50%;
    border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
    flex-shrink:0;
    transition:all .2s ease;
    background:var(--bg-0);
  }
  .chk.ok{color:var(--text-hi);}
  .chk.ok .dot{
    background:var(--teal-dim);
    border-color:var(--teal);
    color:var(--teal);
  }

  .flags{
    margin-top:16px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .flag{
    display:flex;
    gap:9px;
    align-items:flex-start;
    font-size:13px;
    line-height:1.5;
    padding:10px 12px;
    border-radius:8px;
    background:var(--amber-dim);
    color:#F3CD97;
    border:1px solid #4A3714;
  }
  .flag.danger{background:var(--red-dim);color:#F3AEB1;border-color:#5A2226;}

  .gen-row{
    display:flex;
    gap:10px;
    margin-top:8px;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:13.5px;
    padding:11px 16px;
    border-radius:9px;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--text-hi);
    cursor:pointer;
    transition:all .15s ease;
    display:flex;align-items:center;gap:7px;
  }
  .btn:hover{border-color:var(--text-low);background:var(--bg-3);}
  .btn.primary{
    background:var(--teal);
    border-color:var(--teal);
    color:#04160F;
    font-weight:600;
  }
  .btn.primary:hover{background:#5CFAC0;box-shadow:0 0 20px rgba(44,245,160,0.25);}

  footer{
    text-align:center;
    color:var(--text-low);
    font-size:12px;
    margin-top:28px;
    line-height:1.6;
    font-family:'JetBrains Mono',monospace;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1 style="text-align:center;">Password Complexity Checker</h1>

  <div class="panel">
    <span class="field-label">Password</span>
    <div class="input-row">
      <input type="password" id="pwd" placeholder="Start typing..." autocomplete="off" spellcheck="false"/>
      <div class="input-actions">
        <button class="icon-btn" id="toggleVis" title="Show password" type="button">&#128065;</button>
        <button class="icon-btn" id="copyBtn" title="Copy password" type="button">&#10063;</button>
      </div>
    </div>

    <div class="meter-row" id="meter">
      <div class="seg"><i></i></div>
      <div class="seg"><i></i></div>
      <div class="seg"><i></i></div>
      <div class="seg"><i></i></div>
      <div class="seg"><i></i></div>
    </div>

    <div class="verdict-row">
      <span id="verdict">Enter a password</span>
      <span id="entropy">— bits</span>
    </div>
    <p id="crack-time">Estimated time to crack: <b>—</b></p>

    <div class="checklist" id="checklist">
      <div class="chk" data-k="len"><span class="dot">&#10003;</span>At least 12 characters</div>
      <div class="chk" data-k="lower"><span class="dot">&#10003;</span>Lowercase letter</div>
      <div class="chk" data-k="upper"><span class="dot">&#10003;</span>Uppercase letter</div>
      <div class="chk" data-k="num"><span class="dot">&#10003;</span>Number</div>
      <div class="chk" data-k="sym"><span class="dot">&#10003;</span>Special character</div>
      <div class="chk" data-k="pattern"><span class="dot">&#10003;</span>No obvious pattern</div>
    </div>

    <div class="flags" id="flags"></div>
  </div>

  <div class="panel" style="padding:20px 28px;">
    <div class="gen-row">
      <button class="btn primary" id="genBtn" type="button">Generate strong password</button>
      <button class="btn" id="applyBtn" type="button" style="display:none;">Use this one</button>
    </div>
  </div>

  <footer>All checks run locally in your browser. Nothing you type is stored, logged, or transmitted.</footer>
</div>

<script>
const pwdInput = document.getElementById('pwd');
const toggleVis = document.getElementById('toggleVis');
const copyBtn = document.getElementById('copyBtn');
const verdict = document.getElementById('verdict');
const entropyEl = document.getElementById('entropy');
const crackTimeEl = document.getElementById('crack-time');
const flagsEl = document.getElementById('flags');
const segs = document.querySelectorAll('#meter .seg i');
const genBtn = document.getElementById('genBtn');
const applyBtn = document.getElementById('applyBtn');

let generated = '';

const commonPasswords = ['password','123456','12345678','qwerty','abc123','letmein','welcome','admin','iloveyou','111111','123123','monkey','football','dragon','master','passw0rd','trustno1','000000','1234567890'];

const levels = [
  {label:'Very weak', color:'var(--red)'},
  {label:'Weak', color:'var(--red)'},
  {label:'Fair', color:'var(--amber)'},
  {label:'Strong', color:'var(--teal)'},
  {label:'Very strong', color:'var(--teal)'}
];

function analyze(pw){
  const checks = {
    len: pw.length >= 12,
    lower: /[a-z]/.test(pw),
    upper: /[A-Z]/.test(pw),
    num: /[0-9]/.test(pw),
    sym: /[^A-Za-z0-9]/.test(pw),
    pattern: true
  };

  const lower = pw.toLowerCase();
  const flags = [];

  if (pw.length > 0 && pw.length < 8){
    checks.pattern = false;
    flags.push({level:'danger', text:'Under 8 characters — very easy to brute-force.'});
  }
  if (commonPasswords.some(c => lower === c || lower.includes(c))){
    checks.pattern = false;
    flags.push({level:'danger', text:'Matches a commonly leaked password.'});
  }
  if (/(.)\1{2,}/.test(pw)){
    checks.pattern = false;
    flags.push({level:'warn', text:'Contains a repeated character run, e.g. "aaa".'});
  }
  if (/0123|1234|2345|3456|4567|5678|6789|abcd|bcde|cdef|qwerty|asdf/i.test(pw)){
    checks.pattern = false;
    flags.push({level:'warn', text:'Contains a sequential or keyboard pattern.'});
  }
  if (pw.length >= 8 && !/[0-9]/.test(pw) && !/[^A-Za-z0-9]/.test(pw)){
    flags.push({level:'warn', text:'Letters only — add numbers or symbols for a big boost.'});
  }

  let charsetSize = 0;
  if (checks.lower) charsetSize += 26;
  if (checks.upper) charsetSize += 26;
  if (checks.num) charsetSize += 10;
  if (checks.sym) charsetSize += 32;
  const entropy = pw.length > 0 ? Math.round(pw.length * Math.log2(Math.max(charsetSize,1))) : 0;

  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (checks.lower && checks.upper) score++;
  if (checks.num) score++;
  if (checks.sym) score++;
  if (!checks.pattern) score = Math.max(0, score - 2);
  score = Math.min(score, 5);

  return {checks, flags, entropy, score};
}

function crackTimeLabel(entropyBits){
  if (entropyBits <= 0) return '—';
  const guessesPerSecond = 1e10;
  const seconds = Math.pow(2, entropyBits) / guessesPerSecond;
  const units = [
    [60,'seconds'],[60,'minutes'],[24,'hours'],[365,'days'],
    [100,'years'],[10,'centuries']
  ];
  let val = seconds, label='seconds';
  if (val < 1) return 'instantly';
  for (const [div, name] of units){
    if (val < div){ label = name; break; }
    val = val / div;
    label = name;
  }
  if (label === 'centuries' && val > 1000) return 'trillions of years';
  return `${val < 10 ? val.toFixed(1) : Math.round(val)} ${label}`;
}

function render(){
  const pw = pwdInput.value;
  const {checks, flags, entropy, score} = analyze(pw);

  segs.forEach((s, i) => {
    if (pw.length === 0){ s.style.width='0%'; return; }
    if (i < score){
      s.style.width = '100%';
      s.style.background = levels[Math.max(score-1,0)].color;
    } else {
      s.style.width = '0%';
    }
  });

  if (pw.length === 0){
    verdict.textContent = 'Enter a password';
    verdict.style.color = 'var(--text-hi)';
    entropyEl.textContent = '— bits';
    crackTimeEl.innerHTML = 'Estimated time to crack: <b>—</b>';
  } else {
    const lv = levels[Math.max(score-1,0)];
    verdict.textContent = lv.label;
    verdict.style.color = lv.color;
    entropyEl.textContent = `${entropy} bits`;
    crackTimeEl.innerHTML = `Estimated time to crack: <b>${crackTimeLabel(entropy)}</b>`;
  }

  Object.keys(checks).forEach(k => {
    const el = document.querySelector(`.chk[data-k="${k}"]`);
    if (checks[k] && pw.length > 0){
      el.classList.add('ok');
      el.querySelector('.dot').textContent = '✓';
    } else {
      el.classList.remove('ok');
      el.querySelector('.dot').textContent = '';
    }
  });

  flagsEl.innerHTML = '';
  flags.forEach(f => {
    const div = document.createElement('div');
    div.className = 'flag' + (f.level === 'danger' ? ' danger' : '');
    div.textContent = f.text;
    flagsEl.appendChild(div);
  });
}

pwdInput.addEventListener('input', render);

toggleVis.addEventListener('click', () => {
  const isPwd = pwdInput.type === 'password';
  pwdInput.type = isPwd ? 'text' : 'password';
  toggleVis.textContent = isPwd ? '\u{1F576}' : '\u{1F441}';
});

copyBtn.addEventListener('click', async () => {
  if (!pwdInput.value) return;
  try {
    await navigator.clipboard.writeText(pwdInput.value);
    copyBtn.textContent = '✓';
    setTimeout(() => copyBtn.textContent = '⧓', 1200);
  } catch(e) {}
});

function generatePassword(){
  const lower = 'abcdefghijkmnpqrstuvwxyz';
  const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const nums = '23456789';
  const syms = '!@#$%^&*-_=+?';
  const all = lower + upper + nums + syms;
  let pw = [
    lower[Math.floor(Math.random()*lower.length)],
    upper[Math.floor(Math.random()*upper.length)],
    nums[Math.floor(Math.random()*nums.length)],
    syms[Math.floor(Math.random()*syms.length)]
  ];
  for (let i = 0; i < 12; i++){
    pw.push(all[Math.floor(Math.random()*all.length)]);
  }
  pw = pw.sort(() => Math.random() - 0.5).join('');
  return pw;
}

genBtn.addEventListener('click', () => {
  generated = generatePassword();
  genBtn.textContent = generated;
  genBtn.style.fontFamily = "'JetBrains Mono', monospace";
  genBtn.style.letterSpacing = '0.02em';
  applyBtn.style.display = 'flex';
});

applyBtn.addEventListener('click', () => {
  if (!generated) return;
  pwdInput.value = generated;
  pwdInput.type = 'text';
  toggleVis.textContent = '\u{1F576}';
  render();
});

render();
</script>
</body>
</html>
